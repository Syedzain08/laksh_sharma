heading: ABOUT ME
bio: "Laksh is a London-based performer known for bringing real energy,
  confidence and connection to every stage he steps on. With years of live
  experience, he understands how to read a room, build momentum and create
  moments that people genuinely remember. Whether it’s a private celebration,
  corporate event or live show, his focus is simple: deliver a polished
  performance that feels effortless, engaging and tailored to the audience.
  Based in London and available across the UK, Laksh brings professionalism,
  presence and personality to every booking."
tagline: Over 6 years of live band experience
